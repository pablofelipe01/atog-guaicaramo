<!doctype html>
<html lang="es-CO">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta name="description" content="Nelore CIA Ciclo Corto: genética de talla mundial que reduce los ciclos de producción. Toros Nelore 100%, cruces con Brahman, portafolio y biotecnología en Hato Guaicaramo." />

<link rel="stylesheet" href="colors_and_type.css" />

<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--g-bg);
    color: var(--g-fg);
    font-family: var(--g-font-sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  ::selection { background: var(--g-verde-200); color: var(--g-verde-900); }
  :focus-visible {
    outline: 3px solid var(--g-focus-ring);
    outline-offset: 3px;
    border-radius: 4px;
  }
  main { padding-top: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="image-slot.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/components.jsx"></script>
<script type="text/babel" src="components/HatoHeader.jsx"></script>
<script type="text/babel" src="components/GeneticaTalla.jsx"></script>
<script type="text/babel" src="components/HatoFooter.jsx"></script>

<script type="text/babel">
function GeneticaPage() {
  const onNavigate = (id) => {
    if (id === "top" || id === "home") {
      window.location.href = "index.html";
      return;
    }
    window.location.href = "index.html#" + id;
  };

  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  return (
    <div data-screen-label="Genética de talla mundial · Hato Guaicaramo">
      <HatoHeader active="genetica" onNavigate={onNavigate} forceLight />
      <main>
        <GeneticaTalla />
      </main>
      <HatoFooter />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<GeneticaPage />);
</script>
</body>
</html>
